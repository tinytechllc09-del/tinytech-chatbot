<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBWC Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: white; }
        .chat-wrap { display: flex; flex-direction: column; height: 100vh; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 18px; line-height: 1.5; }
        .bot { background: #f0f4f0; color: #1b4329; align-self: flex-start; }
        .user { background: #1b4329; color: white; align-self: flex-end; }
        .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e2e8f0; background: white; }
        .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 24px; font-size: 18px; outline: none; }
        .chat-input input:focus { border-color: #1b4329; }
        .chat-input button { background: #1b4329; color: white; border: none; border-radius: 24px; padding: 10px 20px; font-size: 18px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-wrap">
    <div class="chat-messages" id="messages">
        <div class="message bot">Hi! I'm the NBWC assistant. How can I help you today?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question..." />
        <button id="sendBtn">Send</button>
    </div>
</div>
<script>
    var input = document.getElementById('userInput');
    var btn = document.getElementById('sendBtn');
    var messages = document.getElementById('messages');

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

    function sendMessage() {
        var text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        var typing = addMessage('Typing...', 'bot');
        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        }).then(r => r.json()).then(data => {
            typing.textContent = data.reply;
            messages.scrollTop = messages.scrollHeight;
        });
    }

    function addMessage(text, cls) {
        var div = document.createElement('div');
        div.className = 'message ' + cls;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
    }
</script>
</body>
</html>
