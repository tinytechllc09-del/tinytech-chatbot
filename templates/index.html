<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBWC Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-header {
            background: #1b4329;
            color: white;
            padding: 16px 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 700;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.bot {
            background: #f0f4f0;
            color: #1b4329;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: #1b4329;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #e2e8f0;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #1b4329;
        }

        .chat-input button {
            background: #1b4329;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #2a623d;
        }

        .typing {
            font-size: 13px;
            color: #94a3b8;
            align-self: flex-start;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>New Beginnings Worship Center</h2>
        <p>Ask me anything about NBWC</p>
    </div>

    <div class="chat-messages" id="messages">
        <div class="message bot">
            Hi! I'm the NBWC assistant. How can I help you today?
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const input = document.getElementById('userInput');
    const messages = document.getElementById('messages');

    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.textContent = 'Typing...';
        messages.appendChild(typing);
        messages.scrollTop = messages.scrollHeight;

        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        })
        .then(r => r.json())
        .then(data => {
            typing.remove();
            addMessage(data.reply, 'bot');
        });
    }

    function addMessage(text, who) {
        const div = document.createElement('div');
        div.className = 'message ' + who;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
</script>

</body>
</html>
